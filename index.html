<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verbo — Estudio bíblico en español</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<meta name="theme-color" content="#7f2d35">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Verbo">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__mark">Verbo</span>
      <span class="app-header__sub">Estudio bíblico en español</span>
    </div>
    <div class="app-header__nav">
      <div class="version-picker">
        <label class="version-picker__label">Leyendo</label>
        <select id="mainVersionSelect" class="version-picker__select"></select>
      </div>
      <div class="passage-picker" aria-label="Seleccionar pasaje">
        <select id="bookSelect" class="passage-picker__select passage-picker__select--book" aria-label="Libro"></select>
        <select id="chapterSelect" class="passage-picker__select passage-picker__select--chapter" aria-label="Capítulo"></select>
        <button id="prevChapter" class="passage-picker__button" type="button" aria-label="Capítulo anterior">‹</button>
        <button id="nextChapter" class="passage-picker__button" type="button" aria-label="Capítulo siguiente">›</button>
      </div>
      <button class="search-trigger" id="searchTrigger" type="button" aria-label="Buscar en la Biblia">
        <span>⌕</span>
        <span>Buscar</span>
      </button>
    </div>
  </header>

  <div class="app-body">

    <main class="reading-pane" id="readingPane">
      <div class="reading-pane__inner">
        <div class="chapter-eyebrow"></div>
        <h1 class="chapter-title"></h1>
        <div id="verseList"></div>
      </div>
    </main>

    <aside class="side-panel" id="sidePanel">
      <div class="side-panel__inner">
        <div class="side-panel__header">
          <span class="side-panel__title" id="panelTitle">Panel</span>
          <button class="side-panel__close" id="panelClose" aria-label="Cerrar panel">✕</button>
        </div>
        <div class="side-panel__toolbar" id="panelToolbar"></div>
        <div class="side-panel__body" id="panelBody"></div>
      </div>
    </aside>

    <nav class="tab-rail">
      <button class="tab-rail__btn" data-tab="comentario" title="Comentario" aria-label="Comentario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="tab-rail__dot"></span>
      </button>
      <button class="tab-rail__btn" data-tab="comparar" title="Comparar versiones" aria-label="Comparar versiones">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="4" width="7" height="16" rx="1"/>
          <rect x="14" y="4" width="7" height="16" rx="1"/>
        </svg>
      </button>
      <button class="tab-rail__btn" data-tab="diccionario" title="Diccionario" aria-label="Diccionario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </button>
      <button class="tab-rail__btn" data-tab="notas" title="Mis notas" aria-label="Mis notas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>
        </svg>
      </button>
      <button class="tab-rail__btn" data-tab="tema" title="Tema" aria-label="Tema">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 22a10 10 0 1 1 10-10c0 1.7-1.4 3-3.1 3h-1.4a1.5 1.5 0 0 0-1.5 1.5c0 .4.1.7.3 1A2.9 2.9 0 0 1 13.8 22H12z"/>
          <circle cx="7.5" cy="10.5" r=".8"/>
          <circle cx="10" cy="6.8" r=".8"/>
          <circle cx="14.3" cy="6.8" r=".8"/>
          <circle cx="17" cy="10.5" r=".8"/>
        </svg>
      </button>
    </nav>

  </div>

  <script src="assets/module-loader.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
